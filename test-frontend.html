<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FastAPI Frontend Test</title>
</head>
<body>
  <h1>FastAPI Frontend Test</h1>

  <input id="nameInput" placeholder="輸入名字" value="Sharon" />
  <input id="styleInput" placeholder="輸入風格" value="celebrity" />

  <button onclick="sendRequest()">送出到 Backend</button>

  <pre id="result"></pre>

  <script>
    async function sendRequest() {
      const name = document.getElementById("nameInput").value;
      const style = document.getElementById("styleInput").value;

      const response = await fetch("http://127.0.0.1:8000/generate-photo", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: name,
          style: style
        })
      });

      const data = await response.json();

      document.getElementById("result").textContent =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
